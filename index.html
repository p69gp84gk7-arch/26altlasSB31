<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>TopoProfiler AIO</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/geotiff"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.11.0/proj4.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="sidebar">
        <h2>TopoProfiler</h2>
        <input type="file" id="file-input" webkitdirectory directory multiple>
        <div id="controls">
            <button id="btn-measure">📏 Mesure & Profil</button>
            <button id="btn-clear">🗑️ Effacer</button>
            <button id="btn-export" style="display:none;">💾 Export PNG</button>
        </div>
        <div id="layer-status">
            <h4>Couches actives :</h4>
            <ul id="file-list"></ul>
        </div>
    </div>
    <div id="map"></div>
    <div id="profile-window"><canvas id="profileChart"></canvas></div>
    <script src="main.js"></script>
</body>
</html>
