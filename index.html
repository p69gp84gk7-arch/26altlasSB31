<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>TopoProfiler - Luchon Edition</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; display: flex; height: 100vh; background: #1a1a1a; color: white; font-family: sans-serif; }
        #sidebar { width: 300px; padding: 20px; background: #252525; z-index: 1000; box-shadow: 2px 0 10px rgba(0,0,0,0.5); }
        #map { flex-grow: 1; height: 100%; background: #000; cursor: crosshair; }
        
        /* Fenêtre profil en bas comme avant */
        #profile-window { 
            position: absolute; bottom: 20px; left: 320px; right: 20px; 
            height: 250px; background: white; display: none; border-radius: 8px; padding: 15px; z-index: 1001;
        }
        
        #coords-display {
            margin-top: 20px; padding: 10px; background: #333; border-radius: 5px; border-left: 4px solid #00d1b2;
            font-family: monospace; font-size: 0.9em;
        }

        .btn { width: 100%; padding: 12px; margin: 5px 0; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        #btn-measure { background: #f1c40f; color: black; }
        #btn-export { background: #3498db; color: white; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>TopoProfiler</h2>
        <input type="file" id="file-input" webkitdirectory directory multiple>
        
        <div id="coords-display">
            X: <span id="cur-x">0</span><br>
            Y: <span id="cur-y">0</span><br>
            <b>Z: <span id="cur-z" style="color:#00d1b2">0.00</span> m</b>
        </div>

        <button id="btn-measure" class="btn">📏 Tracer Profil</button>
        <button id="btn-export" class="btn" style="display:none;">💾 Export PNG</button>
        <button onclick="location.reload()" class="btn" style="background:#444; color:white;">🔄 Actualiser</button>

        <ul id="file-list" style="font-size: 0.8em; color: #00d1b2; margin-top:20px;"></ul>
    </div>

    <div id="map"></div>
    <div id="profile-window">
        <canvas id="profileChart"></canvas>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.11.0/proj4.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/geotiff"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="main.js"></script>
</body>
</html>
