<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TopoProfiler - A à Z</title>
    
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.11.0/proj4.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="ui-container">
    <div id="sidebar">
        <h2>TopoProfiler</h2>
        <hr>
        <label>1. Importer un fichier</label>
        <input type="file" id="file-input" accept=".tif,.tiff,.las,.laz">
        
        <div id="layer-manager">
            <h3>Couches</h3>
            <label><input type="radio" name="bg" value="sat" checked> Satellite</label><br>
            <label><input type="radio" name="bg" value="topo"> Topographie</label>
        </div>
        
        <div id="stats">
            <p>Fichier : <span id="file-name">-</span></p>
        </div>
    </div>
    <div id="map"></div>
</div>

<script src="main.js"></script>
</body>
</html>
