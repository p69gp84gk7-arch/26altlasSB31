<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>TopoProfiler v3 - Import Fix</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; display: flex; height: 100vh; background: #1a1a1a; color: white; font-family: sans-serif; }
        #sidebar { width: 320px; padding: 20px; background: #252525; z-index: 1000; overflow-y: auto; }
        #map { flex-grow: 1; height: 100%; }
        
        /* Zone de dépôt visuelle */
        #drop-zone {
            border: 2px dashed #00d1b2;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
            border-radius: 8px;
            transition: 0.3s;
        }
        #drop-zone.hover { background: rgba(0, 209, 178, 0.2); }
        
        #profile-window { 
            position: absolute; bottom: 20px; left: 340px; right: 20px; 
            height: 250px; background: white; display: none; border-radius: 8px; padding: 15px; z-index: 1001;
        }
        .btn { width: 100%; padding: 12px; margin: 5px 0; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        #btn-measure { background: #f1c40f; color: black; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>TopoProfiler</h2>
        
        <div id="drop-zone">
            Glissez votre dossier ici<br>ou<br>
            <input type="file" id="file-input" webkitdirectory directory multiple>
        </div>
        
        <button id="btn-measure" class="btn">📏 Tracer Profil</button>
        <button id="btn-export" class="btn" style="background:#3498db; color:white; display:none;">💾 Export PNG</button>
        
        <h4>Fichiers détectés :</h4>
        <ul id="file-list" style="font-size: 0.75em; color: #00d1b2;"></ul>
    </div>

    <div id="map"></div>
    <div id="profile-window"><canvas id="profileChart"></canvas></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.11.0/proj4.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/geotiff"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="main.js"></script>
</body>
</html>
