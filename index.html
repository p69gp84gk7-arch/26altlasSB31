<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>TopoProfiler Expert - Luchon</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --accent: #00d1b2; --dark: #1a1a1a; --panel: #252525; }
        body { margin: 0; display: flex; height: 100vh; background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* Colonne Gauche : Imports */
        #sidebar-left { width: 280px; padding: 15px; background: var(--panel); border-right: 1px solid #444; display: flex; flex-direction: column; }
        
        /* Centre : Carte */
        #map { flex-grow: 1; position: relative; }

        /* Colonne Droite : Mesures & Outils */
        #sidebar-right { width: 320px; padding: 15px; background: var(--panel); border-left: 1px solid #444; display: flex; flex-direction: column; overflow-y: auto; }

        .section-title { color: var(--accent); font-size: 0.9em; font-weight: bold; text-transform: uppercase; margin-bottom: 10px; border-bottom: 1px solid #444; padding-bottom: 5px; }
        
        /* Boutons d'outils */
        .tool-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .btn-tool { background: #333; color: white; border: 1px solid #555; padding: 10px; border-radius: 4px; cursor: pointer; font-size: 0.8em; transition: 0.2s; }
        .btn-tool:hover { background: #444; border-color: var(--accent); }
        .btn-tool.active { background: var(--accent); color: black; font-weight: bold; }

        /* Liste des mesures */
        .measure-card { background: #111; border-radius: 5px; padding: 10px; margin-bottom: 10px; border-left: 4px solid var(--accent); position: relative; }
        .measure-card h5 { margin: 0 0 5px 0; font-size: 0.9em; }
        .measure-card p { margin: 2px 0; font-size: 0.85em; color: #ccc; }
        .btn-del-mini { position: absolute; top: 5px; right: 5px; background: none; border: none; color: #ff4757; cursor: pointer; }

        #profile-window { position: absolute; bottom: 10px; left: 295px; right: 335px; height: 220px; background: white; display: none; border-radius: 8px; padding: 10px; z-index: 1001; }
        
        .coords-box { background: #000; padding: 10px; border-radius: 4px; font-family: monospace; font-size: 0.85em; margin-top: auto; }
    </style>
</head>
<body>

    <div id="sidebar-left">
        <h3 style="color:var(--accent); margin:0;">TopoProfiler</h3>
        <p style="font-size:0.7em; color:#777; margin-bottom:20px;">Luchon Precision v5.0</p>
        
        <div class="section-title">Données</div>
        <input type="file" id="file-input" multiple style="font-size:0.8em; margin-bottom:5px;">
        <input type="file" id="folder-input" webkitdirectory directory multiple style="font-size:0.8em;">
        
        <div id="layer-manager" style="margin-top:20px;"></div>
    </div>

    <div id="map"></div>

    <div id="sidebar-right">
        <div class="section-title">Outils de Mesure</div>
        <div class="tool-grid">
            <button class="btn-tool" onclick="startMeasure('line')">📏 Longueur</button>
            <button class="btn-tool" onclick="startMeasure('area')">📐 Surface</button>
            <button class="btn-tool" onclick="startMeasure('slope')">📉 Pente %</button>
            <button class="btn-tool" onclick="startMeasure('profile')">📈 Profil Z</button>
        </div>

        <div class="section-title">Mesures en mémoire</div>
        <div id="measure-list"></div>

        <div class="section-title">Export & Vue</div>
        <button class="btn-tool" style="width:100%" onclick="window.print()">🖨️ Exporter la vue (PDF/Image)</button>
        <select id="map-scale" class="btn-tool" style="width:100%; margin-top:5px;" onchange="changeScale()">
            <option value="14">Échelle : Quartier</option>
            <option value="16">Échelle : Terrain</option>
            <option value="18">Échelle : Centimétrique</option>
        </select>

        <div class="coords-box">
            X: <span id="cur-x">0</span> | Y: <span id="cur-y">0</span><br>
            Z: <span id="cur-z" style="color:var(--accent)">0.00</span> m
        </div>
    </div>

    <div id="profile-window">
        <canvas id="profileChart"></canvas>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.11.0/proj4.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/geotiff"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="main.js"></script>
</body>
</html>
