<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>TopoProfiler - Version Stable</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.11.0/proj4.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/geotiff"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { margin: 0; display: flex; height: 100vh; background: #1a1a1a; font-family: sans-serif; color: white; }
        #sidebar { width: 300px; padding: 20px; background: #222; z-index: 1000; box-shadow: 2px 0 5px rgba(0,0,0,0.5); }
        #map { flex-grow: 1; background: #000; }
        #profile-container { 
            position: absolute; bottom: 10px; left: 310px; right: 10px; 
            height: 220px; background: white; display: none; border-radius: 5px; padding: 10px; z-index: 2000;
        }
        .btn { width: 100%; padding: 10px; margin: 5px 0; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; }
        #btn-draw { background: #f1c40f; color: black; }
        input[type="file"] { margin: 10px 0; font-size: 0.8em; }
        h2 { color: #00d1b2; margin-top: 0; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>TopoProfiler</h2>
    <p style="font-size: 0.8em; color: #888;">1. Charger dossier MNT/LAS<br>2. Cliquer sur "Tracer"<br>3. Double-clic pour finir</p>
    
    <input type="file" id="file-input" webkitdirectory directory multiple>
    
    <button id="btn-draw" class="btn">📏 Tracer Profil</button>
    <button id="btn-export" class="btn" style="background:#3498db; color:white; display:none;">💾 Export PNG</button>
    
    <div id="layers-list" style="margin-top:20px; font-size:0.8em;">
        <strong>Dalles chargées :</strong>
        <ul id="file-names" style="color:#00d1b2; padding-left:15px;"></ul>
    </div>
</div>

<div id="map"></div>

<div id="profile-container">
    <canvas id="profileChart"></canvas>
</div>

<script src="main.js"></script>
</body>
</html>
