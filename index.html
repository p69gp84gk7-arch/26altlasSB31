<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>TopoProfiler Expert - Luchon</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --accent: #00d1b2; --panel: #222; --bg: #111; }
        body { margin: 0; display: flex; height: 100vh; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* Layout 3 colonnes */
        #left-panel { width: 280px; background: var(--panel); padding: 15px; border-right: 1px solid #444; display: flex; flex-direction: column; }
        #map { flex-grow: 1; position: relative; background: #000; cursor: crosshair; }
        #right-panel { width: 320px; background: var(--panel); padding: 15px; border-left: 1px solid #444; display: flex; flex-direction: column; overflow-y: auto; }

        h2 { color: var(--accent); margin: 0 0 5px 0; font-size: 1.5em; }
        .section { margin-top: 20px; border-top: 1px solid #444; padding-top: 15px; }
        .title { font-size: 0.8em; text-transform: uppercase; color: #888; margin-bottom: 10px; font-weight: bold; }

        /* Boutons Outils */
        .btn { width: 100%; padding: 10px; margin-bottom: 8px; background: #333; color: white; border: 1px solid #555; border-radius: 4px; cursor: pointer; text-align: left; transition: 0.2s; }
        .btn:hover { background: #444; border-color: var(--accent); }
        .btn.active { background: var(--accent); color: black; font-weight: bold; border-color: var(--accent); }

        /* Cartes de gestion (Layers et Mesures) */
        .card { background: #1a1a1a; padding: 10px; border-radius: 4px; margin-bottom: 8px; border-left: 3px solid var(--accent); position: relative; font-size: 0.85em; line-height: 1.4; }
        .btn-del { position: absolute; top: 5px; right: 5px; color: #ff4757; background: none; border: none; cursor: pointer; font-size: 1.2em; }

        /* Coordonnées */
        .coords { background: #000; padding: 12px; border-radius: 4px; font-family: monospace; font-size: 0.9em; margin-top: auto; border: 1px solid #333; }
        .z-val { color: var(--accent); font-size: 1.2em; font-weight: bold; }

        /* Fenêtre Profil */
        #profile-window {
            position: absolute; bottom: 20px; left: 300px; right: 340px; height: 250px;
            background: white; border-radius: 8px; padding: 15px; z-index: 2000;
            display: none; box-shadow: 0 0 20px rgba(0,0,0,0.5); border: 2px solid var(--accent);
        }

        /* Marqueurs d'édition Leaflet */
        .edit-marker { background: white; border: 2px solid #e74c3c; width: 10px; height: 10px; border-radius: 2px; cursor: move; }
        
        #loading { color: #f1c40f; font-size: 0.8em; display: none; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="left-panel">
        <h2>TopoProfiler</h2>
        <p style="font-size: 0.75em; color: #aaa; margin-top:0;">Bagnères-de-Luchon</p>

        <div class="section">
            <div class="title">Importer MNT (.tif)</div>
            <input type="file" id="file-input" multiple style="font-size: 0.8em; width: 100%; margin-bottom: 5px;">
            <input type="file" id="folder-input" webkitdirectory directory multiple style="font-size: 0.8em; width: 100%;">
            <div id="loading">⏳ Chargement et analyse du fichier...</div>
        </div>

        <div class="section" style="flex-grow: 1; overflow-y: auto;">
            <div class="title">Dalles chargées</div>
            <div id="layer-list"></div>
        </div>
    </div>

    <div id="map"></div>

    <div id="right-panel">
        <div class="section" style="margin-top:0; border-top:none;">
            <div class="title">Outils de tracé</div>
            <button id="btn-line" class="btn" onclick="startTool('line')">📏 Ligne 2 pts (Pente)</button>
            <button id="btn-mline" class="btn" onclick="startTool('mline')">📈 Multi-points (Profil)</button>
            <button id="btn-area" class="btn" onclick="startTool('area')">📐 Polygone (Surface)</button>
            <p style="font-size: 0.75em; color: #888;">Double-cliquez pour terminer un tracé.</p>
        </div>

        <div class="section" style="flex-grow: 1; overflow-y: auto;">
            <div class="title">Résultats (Éditables)</div>
            <div id="measure-list"></div>
        </div>

        <div class="coords">
            X : <span id="cur-x">0.00</span><br>
            Y : <span id="cur-y">0.00</span><br>
            Z : <span id="cur-z" class="z-val">0.00</span> m
        </div>
    </div>

    <div id="profile-window">
        <div style="display: flex; justify-content: space-between; color: black; margin-bottom: 10px; align-items: center;">
            <strong style="font-size: 1.1em;">Profil Altimétrique (Z)</strong>
            <div>
                <button onclick="exportChart()" style="background:#3498db; color:white; border:none; padding:5px 10px; border-radius:3px; cursor:pointer; margin-right:10px;">Export PNG</button>
                <button onclick="document.getElementById('profile-window').style.display='none'" style="background:#e74c3c; color:white; border:none; padding:5px 10px; border-radius:3px; cursor:pointer;">Fermer</button>
            </div>
        </div>
        <div style="height: 180px;"><canvas id="profileChart"></canvas></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.11.0/proj4.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/geotiff"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="main.js"></script>
</body>
</html>
