<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>TopoProfiler Pro - Luchon</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; display: flex; height: 100vh; background: #1a1a1a; color: white; font-family: sans-serif; overflow: hidden; }
        #sidebar { width: 320px; padding: 20px; background: #252525; z-index: 1000; box-shadow: 2px 0 10px rgba(0,0,0,0.5); display: flex; flex-direction: column; }
        #map { flex-grow: 1; height: 100%; background: #000; cursor: crosshair; }
        
        /* Bandeau de profil en bas */
        #profile-window { 
            position: absolute; bottom: 10px; left: 330px; right: 10px; 
            height: 280px; background: white; display: none; border-radius: 8px; padding: 15px; z-index: 1001;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.3);
        }
        
        .layer-item { 
            background: #333; margin: 5px 0; padding: 8px; border-radius: 4px; 
            display: flex; justify-content: space-between; align-items: center; font-size: 0.85em;
        }
        .btn-del { background: #e74c3c; color: white; border: none; padding: 2px 6px; cursor: pointer; border-radius: 3px; }
        
        #coords-display { margin-top: auto; padding: 10px; background: #111; border-radius: 5px; font-family: monospace; border-left: 3px solid #00d1b2; }
        .btn { width: 100%; padding: 12px; margin: 5px 0; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        #btn-measure { background: #f1c40f; color: black; }
        .export-btns { display: flex; gap: 5px; margin-top: 10px; }
        .btn-exp { flex: 1; padding: 5px; font-size: 0.8em; background: #3498db; color: white; border: none; border-radius: 3px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>TopoProfiler</h2>
        
        <label style="font-size: 0.8em; color: #888;">Importation (Fichiers ou Dossiers) :</label>
        <input type="file" id="file-input" multiple style="margin-top:5px;">
        <input type="file" id="folder-input" webkitdirectory directory multiple style="margin-top:5px;">
        
        <button id="btn-measure" class="btn">📏 Tracer Profil (2 points)</button>

        <div style="margin-top: 20px; flex-grow: 1; overflow-y: auto;">
            <strong style="font-size: 0.9em;">Gestion des couches :</strong>
            <div id="layer-manager"></div>
        </div>

        <div id="coords-display">
            Z: <span id="cur-z" style="color:#00d1b2; font-weight:bold;">0.00</span> m
        </div>
    </div>

    <div id="map"></div>

    <div id="profile-window">
        <div style="display:flex; justify-content:space-between; color: black; margin-bottom: 5px;">
            <strong id="prof-title">Profil Altimétrique</strong>
            <div class="export-btns">
                <button onclick="exportData('png')" class="btn-exp">PNG</button>
                <button onclick="exportData('csv')" class="btn-exp">CSV</button>
                <button onclick="document.getElementById('profile-window').style.display='none'" style="background:#888" class="btn-exp">Fermer</button>
            </div>
        </div>
        <div style="height: 200px;"><canvas id="profileChart"></canvas></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.11.0/proj4.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/geotiff"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="main.js"></script>
</body>
</html>
