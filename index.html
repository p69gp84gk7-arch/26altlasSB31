<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>TopoProfiler - Version Stable</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --accent: #00d1b2; --bg: #1a1a1a; --panel: #252525; }
        body { margin: 0; display: flex; height: 100vh; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; }
        
        /* Layout */
        #left-panel { width: 260px; background: var(--panel); padding: 15px; border-right: 1px solid #444; display: flex; flex-direction: column; }
        #map { flex-grow: 1; background: #000; cursor: crosshair; }
        #right-panel { width: 300px; background: var(--panel); padding: 15px; border-left: 1px solid #444; display: flex; flex-direction: column; }

        h3 { color: var(--accent); margin-top: 0; border-bottom: 1px solid #444; padding-bottom: 10px; }
        .subtitle { font-size: 0.8em; color: #888; text-transform: uppercase; margin-bottom: 10px; font-weight: bold; }

        /* Boutons et Inputs */
        .btn-main { width: 100%; padding: 12px; background: #f1c40f; color: black; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; margin-bottom: 15px; }
        .btn-main:hover { background: #d4ac0d; }
        
        /* Cartes de gestion (Layers & Mesures) */
        .card { background: #111; padding: 10px; margin-bottom: 10px; border-radius: 4px; border-left: 3px solid var(--accent); position: relative; font-size: 0.85em; }
        .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }
        .btn-del { color: #ff4757; background: none; border: none; cursor: pointer; font-weight: bold; }
        .color-picker { border: none; width: 25px; height: 25px; cursor: pointer; padding: 0; background: none; }

        /* Fenêtre Profil */
        #profile-window {
            position: absolute; bottom: 20px; left: 280px; right: 320px; height: 220px;
            background: white; border-radius: 8px; padding: 15px; z-index: 2000;
            display: none; box-shadow: 0 5px 20px rgba(0,0,0,0.5); border: 2px solid var(--accent);
        }

        /* Coordonnées */
        .coords { background: #000; padding: 10px; border-radius: 4px; font-family: monospace; margin-top: auto; border: 1px solid #333; }
    </style>
</head>
<body>

    <div id="left-panel">
        <h3>TopoProfiler</h3>
        <div class="subtitle">1. Importer MNT (.tif)</div>
        <input type="file" id="file-input" multiple style="font-size:0.8em; margin-bottom:20px; width:100%;">
        
        <div class="subtitle">2. Fichiers sur la carte</div>
        <div id="mnt-list" style="flex-grow:1; overflow-y:auto;"></div>
    </div>

    <div id="map"></div>

    <div id="right-panel">
        <button class="btn-main" onclick="startLineTool()">📏 Tracer Ligne (2 Points)</button>
        
        <div class="subtitle">Tracés en mémoire</div>
        <div id="measure-list" style="flex-grow:1; overflow-y:auto;"></div>

        <div class="coords">
            X : <span id="cur-x">0.00</span><br>
            Y : <span id="cur-y">0.00</span><br>
            Z : <span id="cur-z" style="color:var(--accent); font-weight:bold; font-size:1.1em;">0.00</span> m
        </div>
    </div>

    <div id="profile-window">
        <div style="display:flex; justify-content:space-between; color:black; margin-bottom:5px; font-weight:bold;">
            <span>Profil Altimétrique</span>
            <button onclick="document.getElementById('profile-window').style.display='none'" style="cursor:pointer;">✕ Fermer</button>
        </div>
        <div style="height:170px;"><canvas id="profileChart"></canvas></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.11.0/proj4.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/geotiff"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="main.js"></script>
</body>
</html>
