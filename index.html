<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>TopoProfiler Expert Luchon</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --accent: #00d1b2; --panel: #252525; }
        body { margin: 0; display: flex; height: 100vh; background: #1a1a1a; color: white; font-family: sans-serif; overflow: hidden; }
        #sidebar-left { width: 280px; padding: 15px; background: var(--panel); border-right: 1px solid #444; }
        #map { flex-grow: 1; position: relative; }
        #sidebar-right { width: 320px; padding: 15px; background: var(--panel); border-left: 1px solid #444; overflow-y: auto; }
        
        .section-title { color: var(--accent); font-size: 0.8em; font-weight: bold; text-transform: uppercase; margin-bottom: 10px; border-bottom: 1px solid #444; padding-top: 15px;}
        .tool-btn { width: 100%; padding: 10px; margin: 4px 0; background: #333; color: white; border: 1px solid #555; border-radius: 4px; cursor: pointer; text-align: left; }
        .tool-btn:hover { border-color: var(--accent); }
        
        #profile-window { position: absolute; bottom: 10px; left: 290px; right: 330px; height: 240px; background: white; border-radius: 8px; padding: 10px; z-index: 1001; display: none; box-shadow: 0 -5px 15px rgba(0,0,0,0.5); }
        .measure-card { background: #111; padding: 10px; margin-bottom: 10px; border-radius: 4px; border-left: 4px solid var(--accent); font-size: 0.9em; position: relative;}
        .btn-del { position: absolute; top: 5px; right: 5px; color: #ff4757; cursor: pointer; background: none; border: none; }
        .coords-box { background: #000; padding: 10px; border-radius: 4px; font-family: monospace; font-size: 0.85em; margin-top: 20px; border: 1px solid #333; }
    </style>
</head>
<body>

    <div id="sidebar-left">
        <h3 style="color:var(--accent)">TopoProfiler</h3>
        <input type="file" id="file-input" multiple style="width:100%; font-size:0.8em;">
        <input type="file" id="folder-input" webkitdirectory directory multiple style="width:100%; font-size:0.8em; margin-top:5px;">
        <div id="layer-manager" style="margin-top:20px;"></div>
    </div>

    <div id="map"></div>

    <div id="sidebar-right">
        <div class="section-title">Mesures (Éditables)</div>
        <button class="tool-btn" onclick="initMeasure('line')">📏 Ligne / Multi-points</button>
        <button class="tool-btn" onclick="initMeasure('area')">📐 Surface (Polygone)</button>
        
        <div id="measure-list" style="margin-top:20px;"></div>

        <div class="coords-box">
            X: <span id="cur-x">0.00</span><br>
            Y: <span id="cur-y">0.00</span><br>
            Z: <span id="cur-z" style="color:var(--accent)">0.00</span> m
        </div>
    </div>

    <div id="profile-window">
        <div style="display:flex; justify-content:space-between; color:black; margin-bottom:5px;">
            <small>Profil Altimétrique (m)</small>
            <button onclick="exportCSV()" style="font-size:0.7em;">Export CSV</button>
        </div>
        <div style="height:190px;"><canvas id="profileChart"></canvas></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.11.0/proj4.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/geotiff"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="main.js"></script>
</body>
</html>
