<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>TopoProfiler Expert - Style IGN</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --primary: #00d1b2; --bg: #1a1a1a; --panel: #252525; }
        body { margin: 0; display: flex; height: 100vh; background: var(--bg); font-family: 'Segoe UI', sans-serif; color: white; }
        
        #sidebar { width: 350px; padding: 20px; background: var(--panel); z-index: 1000; box-shadow: 5px 0 15px rgba(0,0,0,0.3); overflow-y: auto; }
        #map { flex-grow: 1; }

        /* Gestionnaire de couches style IGN */
        .layer-group { background: #333; margin-bottom: 10px; border-radius: 4px; padding: 10px; border-left: 4px solid var(--primary); }
        .layer-group h4 { margin: 0 0 10px 0; font-size: 0.9em; text-transform: uppercase; color: #888; }
        .layer-item { display: flex; justify-content: space-between; font-size: 0.85em; margin-bottom: 5px; background: #444; padding: 5px; border-radius: 3px; }

        #profile-popup {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 900px; height: 500px; background: white; color: black; border-radius: 8px;
            display: none; flex-direction: column; z-index: 3000; padding: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .btn { width: 100%; padding: 10px; margin: 5px 0; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; }
        .btn-main { background: var(--primary); color: black; }
        .btn-draw { background: #f1c40f; color: black; margin-top: 15px; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2 style="color:var(--primary)">TopoProfiler</h2>
    
    <div class="layer-group">
        <h4>Importation</h4>
        <input type="file" id="folder-input" webkitdirectory directory multiple style="display:none">
        <button class="btn btn-main" onclick="document.getElementById('folder-input').click()">📁 Importer Dossier (MNT/LAS)</button>
    </div>

    <div class="layer-group">
        <h4>Couches de Terrain (MNT)</h4>
        <div id="list-mnt"></div>
    </div>

    <div class="layer-group">
        <h4>Nuages de Points (LAS)</h4>
        <div id="list-las"></div>
    </div>

    <button id="btn-draw" class="btn btn-draw">📏 TRACER PROFIL EN LONG</button>
    <button class="btn" style="background:#e74c3c; color:white;" onclick="location.reload()">🔄 Réinitialiser</button>
</div>

<div id="map"></div>

<div id="profile-popup">
    <div style="display:flex; justify-content:space-between;">
        <h3 id="profile-title">Profil Altimétrique Multi-couches</h3>
        <button onclick="document.getElementById('profile-popup').style.display='none'" style="border:none; background:none; font-size:20px; cursor:pointer;">&times;</button>
    </div>
    <div style="flex-grow:1"><canvas id="profileChart"></canvas></div>
    <button id="btn-export" class="btn btn-main" style="width:150px; align-self:flex-end;">💾 PNG</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.11.0/proj4.js"></script>
<script src="https://cdn.jsdelivr.net/npm/geotiff"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="main.js"></script>
</body>
</html>
